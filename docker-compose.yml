version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # 単一プロセス構成: Streamlitが処理エンジンを直接呼び出すため、
      # API_BASE_URLは不要になった
    env_file:
      - .env
    volumes:
      # ローカルでの開発用にコードをマウント
      - ./app:/app/app
      - ./streamlit_app:/app/streamlit_app
      - ./.streamlit:/app/.streamlit
