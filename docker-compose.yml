version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - API_BASE_URL=http://localhost:8081/api/v1
      - PORT=8080
      # GCP認証やAPI設定は.envファイルで読み込む
    env_file:
      - .env
    volumes:
      # ローカルでの開発用にコードをマウント
      - ./app:/app/app
      - ./streamlit_app:/app/streamlit_app
      - ./.streamlit:/app/.streamlit
